# /etc/nginx/sites-available/helper
#
# Wave 回调 URL = mhynetcn://10.234.81.212:8001/callback,办公网内 HTTP,
# 协议层不需要 nginx 反代。但内部 admin / browser 仍可走 nginx 上 https。
#
# 这份 conf 是可选的;最小部署直接 uvicorn 暴露 8001 也行。

server {
    listen 443 ssl;
    server_name xueyuhelper.mihoyo.com;

    # 证书路径按米哈游内部 ca 配,这里只占位
    ssl_certificate     /etc/ssl/certs/xueyuhelper.crt;
    ssl_certificate_key /etc/ssl/private/xueyuhelper.key;

    # admin / browser
    location /admin/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:8001;
    }

    # /callback 留给 Wave 直连 8001(mhynetcn://10.234.81.212:8001/callback)
    # nginx 不反代 callback。
}

# 8001 监听 IPv4 + 内网即可,Wave 推送是办公网 HTTP 直达
