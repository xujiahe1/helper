# LLM model routing — M1 默认快照
#
# 设计参见 docs/architecture.md §8.6 — 与 knowledge_policy 同样规则:
# 策略外置,入 spec git repo,改路由走 PR,git 历史可审计。
#
# bot 运行时只从 spec repo 内的 meta/policies/llm_routing.yaml 读;
# 这份 default 仅作首次 seed。

version: 2026.06.02-v1

defaults:
  max_tokens: 4096

# task 类型 → 走哪个模型。各 task 用途详见 docs/runtime.md §1。
tasks:
  # 全部 Claude 任务统一 sonnet-4-6 (2026-06-02 切换):
  # opus 5x 成本但实测增益不显著, 关键路径错误源于召回/注入而非模型能力。
  ask:             { model: claude-sonnet-4-6, provider: anthropic }
  elicit:          { model: claude-sonnet-4-6, provider: anthropic }
  code_plan:       { model: claude-sonnet-4-6, provider: anthropic }
  intent_classify: { model: claude-sonnet-4-6, provider: anthropic }
  l1_structure:    { model: claude-sonnet-4-6, provider: anthropic, max_tokens: 16384 }
  synonym_judge:   { model: claude-sonnet-4-6, provider: anthropic }
  conflict_judge:  { model: claude-sonnet-4-6, provider: anthropic }
  schedule_parse:  { model: claude-sonnet-4-6, provider: anthropic }
  memory_extract:  { model: claude-sonnet-4-6, provider: anthropic }
  # memory_audit: 周报/inbox 触发前的存量 memory 复审 — 判断每条 alive directive
  # 究竟是真行为指令还是误抽的知识/事实(如"X 是 Y" 身份纠正、"X 是 Z,记住"
  # 评价陈述、"X 不能 Y,因为 Z" 决策依据)。误抽的自动 supersede 掉,避免周报
  # 一直拿错抽数据骚扰 owner。
  memory_audit:    { model: claude-sonnet-4-6, provider: anthropic }
  # inquiry_dedup: 新 inquiry 落库前查询同 scope/spec 的开放追问,LLM 判新问题
  # 相对已问是子集/换皮/新角度。子集和换皮直接丢,只新角度才入库 — 治本,
  # 防止跨 raw 同主题追问越堆越多。
  inquiry_dedup:   { model: claude-sonnet-4-6, provider: anthropic }
  # inquiry_aggregate: 周报渲染时,同主题(scope_ref / 关联 raw / 关联 spec)的
  # 多条未答追问聚合成一条总问题,owner 只需回答总问题即可。原始子追问列在
  # 展开层供需要时查看。
  inquiry_aggregate: { model: claude-sonnet-4-6, provider: anthropic }
  # inquiry_answer_match: owner 回 「答 3-N <答案>」时,把答案 + 该组所有子追问
  # 送 LLM 判断答案语义覆盖了哪些子问题,覆盖的全部一起 close。剩下未覆盖的
  # 留 open,下次周报继续出现。
  inquiry_answer_match: { model: claude-sonnet-4-6, provider: anthropic }
  # M8 ACL 内容打标: 入库时给 raw 判 topic, ask 入口给 question 判 topic。
  # 用 qwen3.6-flash: flash 级判定任务,准确率够 + 成本低 + 速度快。
  # 不限 max_tokens: 之前限 64 的初衷是"输出就是 ge 这种短 id",但 LLM 实际会先
  # 做一段自然语言推理再给结论,64 token 把推理截掉,_parse_tag 取不到合法 id
  # → default,导致大量漏判。放开后让推理走完,_parse_tag 倒序扫所有行精确匹配。
  acl_tag:         { model: qwen3.6-flash, provider: openai }
  # M9 路由场景: 外部 bot (如 tachi) 私聊回 helper, helper 用这个 task 把对方
  # 原文重新组织成 markdown 卡片再回贴原会话 — 对方可能输出扁平 i18n_text(表格被
  # 压成空格连续行)或带组件的 card(form/button 在 helper app 下过不了校验),
  # 由 LLM 重写成可读 markdown 比 helper 端做规则 reflow 更稳。
  restate_bot_reply: { model: claude-sonnet-4-6, provider: anthropic }
  # 路由场景升级: 拿到外部 bot 回执后, 结合 helper 自己的 KB 检索命中 + procedural
  # memory + 群聊上下文 → 让 LLM 综合给一个最终答案 (而不是只重排版 tachi 原话)。
  # 冲突时以 tachi 为准 (它是被路由到的领域专家); helper KB 没命中则调用方退化回
  # restate_bot_reply, 不走这个 task。
  synthesize_with_routed_reply: { model: claude-sonnet-4-6, provider: anthropic }

  # ── L1 预筛(mini): 群聊"听"路径上,关键词没命中时让小模型快速判 yes/no ──
  # 群消息无差别全量跑 Sonnet L1 太烧;关键词预筛覆盖大头,边缘 case 让 mini 兜底。
  # 输入只是一句话,目标是过滤噪音,准确率 80% 也比全量 Sonnet 经济得多。
  l1_prefilter:    { model: qwen3.6-flash, provider: openai }

  # ── 批量后台: M3 起才用上 ──
  # 用途: 文档批量 ingest 抽事实候选 / Replay judge / L2 候选 entity 批量抽取
  #
  # 重要:bulk_extract 接收的是"已切片的小单元"(< 5K 字),不是整篇长文。
  # 整篇文档的章节/段落切片在调用方用规则做,不用 LLM。
  # 整篇长文的"全局理解"(主旨/大方向)走 Sonnet/Opus 主路径,不是 bulk_extract。
  #
  # 选 Qwen flash 而非 Claude 的理由:
  #   1. 切片后单元的简单抽取,flash 级模型准确率够 + 速度快 + 成本低 1-2 个量级
  #   2. 大批量打标场景把成本压在小模型上,主路径 Sonnet/Opus 留给推理任务
  bulk_extract:    { model: qwen3.6-flash, provider: openai }

  # ── Embedding (走专用入口 helper.llm.embed,不通过 run()) ──
  # bge-m3: BAAI 开源,中文检索表现强,1024 维(text-embedding-3-large 是 3072 维,
  # 存储/计算贵 3 倍且对中文不占优)。Athenai 走 OpenAI 兼容 /v1/embeddings。
  # 选 embed_index 这个 task 名是因为后续可能再加 embed_query 走不同模型(M5)。
  embed_index:     { model: bge-m3, provider: openai }
  rerank:          { model: qwen3-rerank, provider: openai }
